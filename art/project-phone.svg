<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 92 92" width="92" height="92" shape-rendering="crispEdges">
<style>
      @keyframes packet-lr {
        0%  { transform: translateX(0px); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100%{ transform: translateX(16px); opacity: 0; }
      }
      @keyframes packet-rl {
        0%  { transform: translateX(0px); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100%{ transform: translateX(-16px); opacity: 0; }
      }
      @keyframes bridge-glow {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.5; }
      }
      .pkt-lr1 { animation: packet-lr 1.5s linear infinite; }
      .pkt-lr2 { animation: packet-lr 1.5s linear infinite 0.5s; }
      .pkt-rl1 { animation: packet-rl 1.5s linear infinite 0.75s; }
      .bridge  { animation: bridge-glow 2s ease-in-out infinite; }
    </style>
